# Sign throughput across model sizes and file counts.
# Requires NO adapter flags beyond sign-model — works with every conformance adapter.
name: key_sign_throughput
description: End-to-end signing throughput across model sizes and file counts
operation: sign
method: key
requires_flags: []

sweep:
  model_shape:
    - { size: 10MB,  files: 1  }
    - { size: 100MB, files: 1  }
    - { size: 100MB, files: 10 }
    - { size: 1GB,   files: 1  }
    - { size: 1GB,   files: 100 }

# Number of timed repetitions per combination.
repeat: 5

# ci_max_size caps model dimensions when --ci is passed to run.py.
# Same schema as model_shape: {size, files?}. Rows exceeding size are skipped;
# file count is capped to files (if given) in parameter-sweep scenarios.
ci_max_size: { size: 100MB }

# Default parameter values recorded in results for every row.
# These are not passed as adapter flags — they document what the adapter uses by default.
defaults:
  hash_algorithm: sha256
  serialization: file
