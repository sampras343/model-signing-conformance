# Hash algorithm throughput comparison (ports exp_hash.py).
# Requires the adapter to support --hash-algorithm on sign-model.
# Neither the Python nor Go CLI currently exposes this flag — this scenario
# will be skipped until an adapter declares it in capabilities.
name: hash_algorithm_sweep
description: Signing throughput by hash algorithm
operation: sign
method: key
requires_flags: ["--hash-algorithm"]

model_shape: { size: 1GB, files: 1 }

sweep:
  # blake2b is the standard identifier accepted by both the Python and Go
  # libraries. blake3 is Python-only and excluded here — add a separate
  # scenario if you need to benchmark it against Python exclusively.
  hash-algorithm: ["sha256", "blake2b"]

repeat: 5
ci_max_size: 100MB
