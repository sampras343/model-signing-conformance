# Shard size vs hashing throughput (ports exp_shard.py).
# Measures only the canonicalization step — no signing overhead.
# Larger shards reduce manifest entry count at the cost of finer-grained verification.
# Requires the adapter to support --shard-size on benchmark-model.
name: shard_size_sweep
description: Hashing throughput and manifest size vs shard size
operation: hash
requires_flags: ["--shard-size"]

model_shape: { size: 10GB, files: 1 }

sweep:
  shard-size: [1048576, 10485760, 104857600, 1073741824]

repeat: 3
ci_max_size: { size: 1GB }

# Default parameter values recorded in results for every row.
defaults:
  hash_algorithm: sha256
  serialization: shard
