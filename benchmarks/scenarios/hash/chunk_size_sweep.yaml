# Read chunk size vs hashing throughput (ports exp_chunk.py).
# Measures only the canonicalization step — no signing overhead.
# chunk-size=0 means read each file whole (no chunking).
# Requires the adapter to support --chunk-size on benchmark-model.
name: chunk_size_sweep
description: Hashing throughput vs read chunk size
operation: hash
requires_flags: ["--chunk-size"]

model_shape: { size: 1GB, files: 1 }

sweep:
  chunk-size: [0, 4096, 65536, 1048576, 16777216, 268435456]

repeat: 5
ci_max_size: 100MB

# Default parameter values recorded in results for every row.
defaults:
  hash_algorithm: sha256
  serialization: file
