name: 'model-signing conformance'
description: >
  Run model-signing conformance tests against a language client adapter.
  Reports pass/fail counts per test category and uploads a JSON artifact.

inputs:
  entrypoint:
    description: >
      Path to the conformance adapter binary or script.
      The adapter must implement the sign-model and verify-model subcommands
      as described in the conformance protocol (see README.md).
    required: true

  skip-signing:
    description: >
      Set to 'true' to skip sign+verify round-trip tests.
      Verify-only tests (pre-committed bundles) still run.
    default: 'false'

  xfail:
    description: >
      Newline- or comma-separated list of test IDs to mark as expected failures.
      Tests matching these IDs will be counted as 'xfailed' rather than 'failed'.
      Example:
        xfail: |
          test_roundtrip[certificate-simple]
          test_verify[historical/historical-v0.2.0-certificate]
    default: ''

  skip-sigstore:
    description: >
      Set to 'true' to skip sigstore tests (for offline environments or
      adapters that do not implement sigstore signing/verification).
    default: 'false'

  sigstore-identity:
    description: >
      Expected certificate identity (SAN) for sigstore verification.
      Defaults to the OIDC beacon workflow identity.
    default: 'https://github.com/sigstore-conformance/extremely-dangerous-public-oidc-beacon/.github/workflows/extremely-dangerous-oidc-beacon.yml@refs/heads/main'

  sigstore-issuer:
    description: >
      Expected OIDC issuer URL for sigstore verification.
    default: 'https://token.actions.githubusercontent.com'

  skip-result-upload:
    description: >
      Set to 'true' to skip uploading the conformance-report.json artifact.
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'

    - name: Install conformance suite dependencies
      shell: bash
      run: pip install -q -r "${{ github.action_path }}/requirements.txt"

    - name: Obtain OIDC token for sigstore tests
      if: ${{ inputs.skip-sigstore != 'true' }}
      uses: sigstore-conformance/extremely-dangerous-public-oidc-beacon@977e8d08554ca9bda279c96e91be2119fb67c730 # main 2026-04-22

    - name: Run conformance tests
      shell: bash
      run: python "${{ github.action_path }}/action.py"
      env:
        INPUT_ENTRYPOINT: ${{ inputs.entrypoint }}
        INPUT_SKIP_SIGNING: ${{ inputs.skip-signing }}
        INPUT_XFAIL: ${{ inputs.xfail }}
        INPUT_SKIP_SIGSTORE: ${{ inputs.skip-sigstore }}
        INPUT_SKIP_RESULT_UPLOAD: ${{ inputs.skip-result-upload }}
        SIGSTORE_ID_TOKEN_FILE: ./oidc-token.txt
        SIGSTORE_IDENTITY: ${{ inputs.sigstore-identity }}
        SIGSTORE_ISSUER: ${{ inputs.sigstore-issuer }}

    - name: Upload conformance report
      if: ${{ always() && inputs.skip-result-upload != 'true' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: conformance-report
        path: conformance-report.json
        if-no-files-found: warn
