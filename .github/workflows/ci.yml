name: Conformance Self-Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    name: Self-test with Python reference adapter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install model-signing (Python reference implementation)
        run: pip install model-signing

      - name: Install conformance suite dependencies
        run: pip install -r requirements.txt

      - name: Run conformance suite with selftest-client
        run: |
          chmod +x selftest-client
          python action.py
        env:
          INPUT_ENTRYPOINT: ${{ github.workspace }}/selftest-client
          INPUT_SKIP_RESULT_UPLOAD: 'true'

      - name: Upload conformance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-report-selftest
          path: conformance-report.json
          if-no-files-found: warn
