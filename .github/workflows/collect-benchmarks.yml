name: Collect Benchmark Results

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC — publish-report triggers on completion
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-results:
    name: Fetch benchmarks from ${{ matrix.client.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client:
          - name: model-transparency-go
            repo: sampras343/model-transparency-go
            artifact: benchmark-results
            workflow: benchmark.yml
          - name: model-transparency-python
            repo: sampras343/model-transparency
            artifact: benchmark-results
            workflow: benchmark.yml

    steps:
      - uses: actions/checkout@v4

      - name: Download benchmark artifact from ${{ matrix.client.repo }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.CONFORMANCE_READ_TOKEN }}
          repo: ${{ matrix.client.repo }}
          workflow: ${{ matrix.client.workflow }}
          name: ${{ matrix.client.artifact }}
          path: results/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Rename artifact to client name
        run: |
          mkdir -p results
          if [ -f results/benchmark-results.json ]; then
            mv results/benchmark-results.json results/${{ matrix.client.name }}.json
          else
            echo '[]' > results/${{ matrix.client.name }}.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-result-${{ matrix.client.name }}
          path: results/${{ matrix.client.name }}.json

  build-report:
    name: Build benchmark HTML report
    runs-on: ubuntu-latest
    needs: fetch-results
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all client benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-result-*
          merge-multiple: true
          path: results/

      - name: Generate benchmark HTML report
        run: |
          python .github/scripts/generate_benchmark_report.py \
            --results-dir results/ \
            --output results/benchmarks-index.html

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-html
          path: results/benchmarks-index.html
          if-no-files-found: warn
