name: Collect Benchmark Results

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC — publish-report triggers on completion
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-results:
    name: Fetch benchmarks from ${{ matrix.client.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client:
          - name: model-transparency-go
            repo: sampras343/model-transparency-go
            artifact: benchmark-results
            workflow: benchmark.yml
          - name: model-transparency-python
            repo: sampras343/model-transparency
            artifact: benchmark-results
            workflow: benchmark.yml

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download benchmark artifact from ${{ matrix.client.repo }}
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          github_token: ${{ secrets.CONFORMANCE_READ_TOKEN }}
          repo: ${{ matrix.client.repo }}
          workflow: ${{ matrix.client.workflow }}
          branch: main
          name: ${{ matrix.client.artifact }}
          path: results/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Rename artifact to client name
        run: |
          mkdir -p results
          if [ -f results/benchmark-results.json ]; then
            mv results/benchmark-results.json results/${{ matrix.client.name }}.json
          else
            echo '[]' > results/${{ matrix.client.name }}.json
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-result-${{ matrix.client.name }}
          path: results/${{ matrix.client.name }}.json

  build-report:
    name: Build benchmark HTML report
    runs-on: ubuntu-latest
    needs: fetch-results
    if: always()

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Download all client benchmark results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: benchmark-result-*
          merge-multiple: true
          path: results/

      - name: Download previous benchmark snapshot
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: collect-benchmarks.yml
          name: benchmark-snapshot
          path: previous/
          if_no_artifact_found: warn
          workflow_conclusion: success
        continue-on-error: true

      - name: Check for benchmark regressions
        if: hashFiles('previous/*.json') != ''
        run: |
          python .github/scripts/check_regression.py \
            --current-dir results/ \
            --previous-dir previous/ \
            --threshold 20
        continue-on-error: true

      - name: Generate benchmark HTML report
        run: |
          PREV_FLAG=""
          if [ -n "$(ls previous/*.json 2>/dev/null)" ]; then
            PREV_FLAG="--previous-dir previous/"
          fi
          python .github/scripts/generate_benchmark_report.py \
            --results-dir results/ \
            $PREV_FLAG \
            --output results/benchmarks-index.html

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-snapshot
          path: results/*.json
          if-no-files-found: warn

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-html
          path: results/benchmarks-index.html
          if-no-files-found: warn
