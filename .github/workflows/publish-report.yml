name: Publish Conformance Report

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Collect Benchmark Results"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  fetch-results:
    name: Fetch results from ${{ matrix.client.name }}
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client:
          - name: model-transparency-go
            repo: sampras343/model-transparency-go
            artifact: conformance-report
            workflow: conformance.yml
          - name: model-transparency-python
            repo: sampras343/model-transparency
            artifact: conformance-report
            workflow: conformance.yml

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download conformance artifact from ${{ matrix.client.repo }}
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          github_token: ${{ secrets.CONFORMANCE_READ_TOKEN }}
          repo: ${{ matrix.client.repo }}
          workflow: ${{ matrix.client.workflow }}
          branch: main
          name: ${{ matrix.client.artifact }}
          path: results/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Rename artifact to client name
        run: |
          mkdir -p results
          if [ -f results/conformance-report.json ]; then
            mv results/conformance-report.json results/${{ matrix.client.name }}.json
          else
            echo '{}' > results/${{ matrix.client.name }}.json
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: client-result-${{ matrix.client.name }}
          path: results/${{ matrix.client.name }}.json

  build-report:
    name: Build HTML report
    runs-on: ubuntu-latest
    needs: fetch-results
    if: always()

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Download all client conformance results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: client-result-*
          merge-multiple: true
          path: results/

      - name: Download benchmark HTML from collect-benchmarks workflow
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: collect-benchmarks.yml
          name: benchmark-html
          path: results/benchmarks/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Place benchmark page
        run: |
          mkdir -p results/benchmarks
          if [ -f results/benchmarks/benchmarks-index.html ]; then
            mv results/benchmarks/benchmarks-index.html results/benchmarks/index.html
          else
            echo '<html><body><p>Benchmark results not yet available — run the <strong>Collect Benchmark Results</strong> workflow first.</p><p><a href="../">← Conformance Report</a></p></body></html>' \
              > results/benchmarks/index.html
          fi

      - name: Generate HTML conformance report
        run: python .github/scripts/generate_report.py --reports-dir results/ --output results/index.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: results/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-report
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
