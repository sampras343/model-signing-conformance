name: Validate Benchmark Scenarios

on:
  push:
    branches: [main]
    paths:
      - 'benchmarks/scenarios/**'
      - 'benchmarks/schema/**'
      - '.github/scripts/validate_scenarios.py'
      - '.github/workflows/validate-scenarios.yml'
  pull_request:
    paths:
      - 'benchmarks/scenarios/**'
      - 'benchmarks/schema/**'
      - '.github/scripts/validate_scenarios.py'
      - '.github/workflows/validate-scenarios.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate scenario schemas
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema pyyaml

      - name: Validate all benchmark scenarios against schema
        run: python .github/scripts/validate_scenarios.py
